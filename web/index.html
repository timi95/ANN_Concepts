<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart-Pole NeuroEvolution (JS)</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        canvas { border: 1px solid #ccc; background: white; max-width: 100%; }
        .controls { margin-top: 1em; text-align: center; max-width: 800px; }
    </style>
</head>
<body>
    <h1>Cart-Pole NeuroEvolution (Pure JavaScript)</h1>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <p>This simulation uses NeuroEvolution to train a neural network to balance a pole on a cart. The entire simulation and visualization are implemented in JavaScript using HTML5 Canvas.</p>
        <p>Status: <span id="status">Starting...</span></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
